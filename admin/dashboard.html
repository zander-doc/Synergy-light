<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – Synergy Light</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/components.css">
</head>

<body>

  <div class="admin-container">

    <!-- Sidebar dinámico -->
    <aside id="sidebar"></aside>

    <!-- Contenido principal -->
    <main class="main-content">

      <!-- Header dinámico -->
      <header id="header"></header>

      <!-- Título -->
      <section class="section-header">
        <h2>Panel Administrativo</h2>
        <div>
          <button class="btn-primary" onclick="window.location.href='clients.html?new=1'" style="margin-right:10px;">+ Nuevo Cliente</button>
          <span id="adminUser" class="admin-user">Administrador</span>
        </div>
      </section>

      <!-- KPIs -->
      <section class="kpi-grid">
        <div class="kpi-card">
          <h3>Clientes Activos</h3>
          <p id="totalClients">0</p>
        </div>

        <div class="kpi-card">
          <h3>Facturas Emitidas</h3>
          <p id="totalInvoices">0</p>
        </div>

        <div class="kpi-card">
          <h3>Ingresos Totales</h3>
          <p id="totalRevenue">$0.00</p>
        </div>

        <div class="kpi-card">
          <h3>Por Vencer</h3>
          <p id="expiringClients">0</p>
        </div>
      </section>

      <!-- Últimos Clientes -->
      <section class="table-section">
        <div class="section-header">
          <h2>Últimos Clientes</h2>
          <button class="btn-primary" onclick="window.location.href='clients.html'">Ver Todos</button>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th>ID Cliente</th>
              <th>Nombre</th>
              <th>Teléfono</th>
              <th>Contrato</th>
              <th>Status</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="recentClientsBody">
            <!-- JS insertará filas -->
          </tbody>
        </table>
      </section>

      <!-- Facturas Recientes -->
      <section class="table-section">
        <div class="section-header">
          <h2>Facturas Recientes</h2>
          <button class="btn-primary" onclick="window.location.href='invoices.html'">Ver Todas</button>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th>Factura #</th>
              <th>Cliente</th>
              <th>Monto</th>
              <th>Fecha</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="recentInvoicesBody">
            <!-- JS insertará filas -->
          </tbody>
        </table>
      </section>

    </main>
  </div>

  <!-- JS -->
  <script src="js/init.js"></script>
  <script src="js/main.js"></script>
  <script src="js/modules/auth.js"></script>
  <script>
    requireAuth();
    loadGlobalComponents();
  </script>
  <script src="js/utils.js"></script>
  <script src="js/dashboard.js"></script>
  
  <!-- MODAL DE FACTURA -->
  <div id="modalFactura" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);z-index:9999;overflow-y:auto;">
    <div style="background:linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);margin:3% auto;padding:35px;border:2px solid #03bc89;border-radius:20px;max-width:850px;width:90%;box-shadow:0 20px 60px rgba(3,188,137,0.4);max-height:94vh;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid rgba(3,188,137,0.3);">
        <h2 style="color:#03bc89;margin:0;font-size:1.8rem">📄 Generar Factura</h2>
        <button onclick="cerrarModalFactura()" style="background:none;border:none;color:#aaa;font-size:2.5rem;cursor:pointer;">&times;</button>
      </div>
      
      <form id="formFactura">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
          <div>
            <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Número de Factura *</label>
            <input type="text" id="facturaNumero" required placeholder="Auto-generado" style="width:100%;padding:12px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;">
          </div>
          <div>
            <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Cliente</label>
            <input type="text" id="facturaCliente" readonly style="width:100%;padding:12px;background:rgba(10,58,42,0.8);border:2px solid #03bc89;color:#03bc89;border-radius:10px;font-weight:bold;">
            <input type="hidden" id="facturaClientId">
          </div>
          <div>
            <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Fecha de Emisión *</label>
            <input type="date" id="facturaFecha" required style="width:100%;padding:12px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;">
          </div>
          <div>
            <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Fecha de Vencimiento *</label>
            <input type="date" id="facturaFechaVenc" required style="width:100%;padding:12px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;">
          </div>
          <div>
            <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Ingreso ($)</label>
            <input type="number" id="facturaIngreso" step="0.01" value="50" oninput="calcularTotalFactura()" style="width:100%;padding:12px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;">
          </div>
          <div>
            <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Costos Fijos ($)</label>
            <input type="number" id="facturaCostos" step="0.01" value="45" oninput="calcularTotalFactura()" style="width:100%;padding:12px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;">
          </div>
          <div>
            <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Depósito ($)</label>
            <input type="number" id="facturaDeposito" step="0.01" value="50" oninput="calcularTotalFactura()" style="width:100%;padding:12px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;">
          </div>
          <div>
            <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">TOTAL ($)</label>
            <input type="number" id="facturaTotal" readonly style="width:100%;padding:12px;background:rgba(10,58,42,0.8);border:2px solid #03bc89;color:#03bc89;border-radius:10px;font-weight:bold;font-size:1.2rem;">
          </div>
          <div>
            <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Estado</label>
            <select id="facturaStatus" style="width:100%;padding:12px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;">
              <option value="PENDIENTE">PENDIENTE</option>
              <option value="PAGADA">PAGADA</option>
            </select>
          </div>
          <div>
            <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Método de Pago</label>
            <select id="facturaMetodoPago" style="width:100%;padding:12px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;">
              <option value="ZELLE">ZELLE</option>
              <option value="CASHAPP">CASHAPP</option>
              <option value="LINK DE PAGO">LINK DE PAGO</option>
            </select>
          </div>
        </div>
        
        <div style="margin-top:30px;display:flex;gap:15px;justify-content:flex-end;padding-top:25px;border-top:2px solid rgba(3,188,137,0.2);">
          <button type="button" onclick="cerrarModalFactura()" style="padding:14px 30px;background:rgba(102,102,102,0.8);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:600;">Cancelar</button>
          <button type="submit" style="padding:14px 30px;background:linear-gradient(135deg, #03bc89 0%, #04d99e 100%);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:700;">💾 Guardar y Generar PDF</button>
        </div>
      </form>
    </div>
  </div>

  <!-- DIAGNÓSTICO -->
  <script>
    console.log('=== DIAGNÓSTICO dashboard.html ===');
    console.log('utils.js cargado:', typeof openWhatsAppMenu !== 'undefined');
    console.log('dashboard.js cargado:', typeof loadDashboard !== 'undefined');
    console.log('localStorage clients:', localStorage.getItem('clients'));
    
    window.addEventListener('error', (e) => {
      console.error('ERROR GLOBAL:', e.message, 'en', e.filename, ':', e.lineno);
    });
  </script>

  <!-- SISTEMA DE FACTURACIÓN -->
  <script>
    // ===============================
    // SISTEMA DE FACTURACIÓN
    // ===============================

    let clienteFacturaActual = null;

    function abrirModalFactura(clientId) {
      console.log('📄 Abriendo modal de factura para:', clientId);
      
      const clientes = JSON.parse(localStorage.getItem('clients') || '[]');
      const client = clientes.find(function(c) { return c.clientId === clientId; });
      
      if (!client) {
        alert('❌ Cliente no encontrado');
        return;
      }
      
      clienteFacturaActual = client;
      
      // Llenar datos del cliente
      document.getElementById('facturaCliente').value = client.name;
      document.getElementById('facturaClientId').value = client.clientId;
      
      // Generar número correlativo de 4 dígitos
      const invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
      let nextNumber = 1;
      if (invoices.length > 0) {
        const lastInvoice = invoices.reduce(function(max, inv) {
          const num = parseInt(inv.invoiceNumber) || 0;
          return num > max ? num : max;
        }, 0);
        nextNumber = lastInvoice + 1;
      }
      document.getElementById('facturaNumero').value = nextNumber.toString().padStart(4, '0');
      
      // Establecer fechas
      const hoy = new Date().toISOString().split('T')[0];
      const vencimiento = new Date();
      vencimiento.setDate(vencimiento.getDate() + 30);
      document.getElementById('facturaFecha').value = hoy;
      document.getElementById('facturaFechaVenc').value = vencimiento.toISOString().split('T')[0];
      
      // Valores por defecto según tipo de contrato
      if (client.contractType === 'TARIFA KWH') {
        document.getElementById('facturaIngreso').value = '50';
        document.getElementById('facturaCostos').value = '45';
      } else {
        document.getElementById('facturaIngreso').value = '75';
        document.getElementById('facturaCostos').value = '45';
      }
      document.getElementById('facturaDeposito').value = client.deposit || 50;
      
      calcularTotalFactura();
      
      // Mostrar modal
      document.getElementById('modalFactura').style.display = 'block';
      document.body.style.overflow = 'hidden';
      
      // Configurar formulario
      document.getElementById('formFactura').onsubmit = function(e) {
        e.preventDefault();
        guardarYGenerarPDF(client);
      };
      
      console.log('✅ Modal de factura abierto');
    }

    function calcularTotalFactura() {
      const ingreso = parseFloat(document.getElementById('facturaIngreso').value) || 0;
      const costos = parseFloat(document.getElementById('facturaCostos').value) || 0;
      const deposito = parseFloat(document.getElementById('facturaDeposito').value) || 0;
      document.getElementById('facturaTotal').value = (ingreso + costos + deposito).toFixed(2);
    }

    function cerrarModalFactura() {
      document.getElementById('modalFactura').style.display = 'none';
      document.body.style.overflow = 'auto';
      clienteFacturaActual = null;
    }

    function guardarYGenerarPDF(client) {
      const invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
      
      const facturaData = {
        invoiceNumber: document.getElementById('facturaNumero').value,
        clientId: document.getElementById('facturaClientId').value,
        clientName: client.name,
        clientPhone: client.phone,
        clientEmail: client.email,
        clientAddress: client.address,
        clientSSID: client.ssid,
        contractType: client.contractType,
        salesAgent: client.salesAgent,
        issueDate: document.getElementById('facturaFecha').value,
        dueDate: document.getElementById('facturaFechaVenc').value,
        income: parseFloat(document.getElementById('facturaIngreso').value) || 0,
        fixedCosts: parseFloat(document.getElementById('facturaCostos').value) || 0,
        deposit: parseFloat(document.getElementById('facturaDeposito').value) || 0,
        total: parseFloat(document.getElementById('facturaTotal').value) || 0,
        status: document.getElementById('facturaStatus').value,
        paymentMethod: document.getElementById('facturaMetodoPago').value,
        createdAt: new Date().toISOString()
      };
      
      invoices.push(facturaData);
      localStorage.setItem('invoices', JSON.stringify(invoices));
      
      alert('✅ Factura #' + facturaData.invoiceNumber + ' guardada');
      
      cerrarModalFactura();
      generarPDFContrato(facturaData, client);
      
      // Recargar dashboard
      if (typeof loadDashboard === 'function') loadDashboard();
    }

    function generarPDFContrato(factura, client) {
      const formatDate = function(dateStr) {
        const date = new Date(dateStr);
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 
                        'July', 'August', 'September', 'October', 'November', 'December'];
        return months[date.getMonth()] + ' ' + date.getDate() + ', ' + date.getFullYear();
      };
      
      const contractNumber = 'CONTRATO-' + Math.floor(Math.random() * 900000 + 100000);
      const customerCode = Math.floor(Math.random() * 90000 + 10000);
      
      const pdfContent = '<!DOCTYPE html><html><head><title>Contrato - ' + factura.clientName + '</title>' +
        '<style>' +
        '@media print { body { margin: 0; } @page { margin: 1cm; } }' +
        'body { font-family: Arial, sans-serif; padding: 20px; background: white; color: black; font-size: 11px; }' +
        '.container { max-width: 900px; margin: 0 auto; border: 3px solid #03bc89; padding: 20px; }' +
        '.header { text-align: center; border-bottom: 3px solid #03bc89; padding-bottom: 15px; margin-bottom: 20px; }' +
        '.logo { font-size: 36px; font-weight: bold; color: #03bc89; margin: 0; }' +
        '.tagline { color: #666; font-size: 14px; margin: 5px 0; }' +
        '.title { font-size: 18px; font-weight: bold; color: #03bc89; margin: 15px 0; text-align: center; }' +
        '.info-section { background: #f0f9f5; padding: 15px; margin: 15px 0; border: 1px solid #03bc89; }' +
        '.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }' +
        '.info-label { font-weight: bold; }' +
        '.contract-section { margin: 20px 0; padding: 15px; background: #f9f9f9; border-left: 4px solid #03bc89; }' +
        '.contract-section h3 { color: #03bc89; margin-top: 0; font-size: 13px; }' +
        '.contract-section p { margin: 8px 0; text-align: justify; }' +
        '.signatures { display: flex; justify-content: space-between; margin: 40px 0 20px; }' +
        '.signature-box { text-align: center; width: 45%; }' +
        '.signature-line { border-top: 2px solid #000; margin-top: 60px; padding-top: 8px; }' +
        '.footer { text-align: center; margin-top: 30px; padding-top: 15px; border-top: 2px solid #03bc89; }' +
        '.footer-tagline { font-style: italic; color: #03bc89; font-size: 14px; font-weight: bold; }' +
        '</style></head><body>' +
        '<div class="container">' +
        
        '<div class="header">' +
        '<h1 class="logo">SYNERGY LIGHT</h1>' +
        '<p class="tagline">Ilumina Tu Vida</p>' +
        '<p class="title">CONTRATO DE SERVICIO DE SUMINISTRO ELÉCTRICO</p>' +
        '</div>' +
        
        '<div class="info-section">' +
        '<div class="info-grid">' +
        '<div><span class="info-label">CUSTOMER ID:</span> ' + factura.clientId + ' &nbsp;&nbsp; ' + customerCode + '</div>' +
        '<div style="text-align:right"><span class="info-label">Contract Number:</span> ' + contractNumber + '</div>' +
        '<div><span class="info-label">NAME:</span> ' + factura.clientName + '</div>' +
        '<div style="text-align:right"><span class="info-label">DATE/SIGNATURE:</span> ' + formatDate(factura.issueDate) + '</div>' +
        '<div><span class="info-label">ADDRESS:</span> ' + factura.clientAddress + '</div>' +
        '<div style="text-align:right"><span class="info-label">PAYMENT DATE:</span> ' + formatDate(factura.dueDate) + '</div>' +
        '<div><span class="info-label">MAIL:</span> ' + (factura.clientEmail || 'N/A') + '</div>' +
        '<div style="text-align:right"><span class="info-label">SSID:</span> ' + factura.clientSSID + '</div>' +
        '<div><span class="info-label">PHONE:</span> (+1)' + factura.clientPhone + '</div>' +
        '<div style="text-align:right;font-weight:bold;color:#03bc89">' + factura.contractType + '</div>' +
        '</div>' +
        '</div>' +
        
        '<div class="contract-section">' +
        '<h3>1. Purpose of the Contract</h3>' +
        '<p>Synergy Light agrees to supply electricity to the Customer at the property located at the address indicated above, according to the terms and conditions established in this contract.</p>' +
        '</div>' +
        
        '<div class="contract-section">' +
        '<h3>2. Consumption Rate Plan per kWh</h3>' +
        '<p>The Customer agrees to subscribe to the Synergy Light Consumption Rate Plan, which consists of the following:</p>' +
        '<p>• Energy Charge: 10.0039¢ per kWh</p>' +
        '<p>• Base Charge: $4.95 per month</p>' +
        '<p>• AEP Texas Central Delivery Charges: $3.21 per month and 6.0380¢ per kWh</p>' +
        '<p>• With a $50.00 deposit per kilowatt-hour (kWh) usage.</p>' +
        '</div>' +
        
        '<div class="contract-section">' +
        '<h3>3. Benefit Plan</h3>' +
        '<p>Stable prices and no surprises: The Customer will pay for the usage due each month.</p>' +
        '</div>' +
        
        '<div class="contract-section">' +
        '<h3>4. Term</h3>' +
        '<p>The contract will have an initial term of 12 months, automatically renewable unless either party notifies its intention to terminate it with proper notice.</p>' +
        '</div>' +
        
        '<div class="contract-section">' +
        '<h3>5. Rules and Conditions</h3>' +
        '<p>The Customer must pay each monthly payment punctually on the agreed date. In case of non-compliance, Synergy Light may suspend the energy supply upon prior notice and apply the penalties provided by law.</p>' +
        '</div>' +
        
        '<div class="contract-section">' +
        '<h3>6. Refund Policy</h3>' +
        '<p>Refunds for errors or improper charges: If the Customer detects an incorrect charge, they must notify Synergy Light within 15 days from the date of the charge in question.</p>' +
        '<p>Procedure: The Customer must submit a formal written complaint via email or form, specifying the details of the erroneous charge. Synergy Light will review the complaint and, if an error is detected, will issue the corresponding refund within a maximum period of 30 days.</p>' +
        '<p>No refunds will be issued for payments made in good faith under the contract, nor for changes of mind within 12 hours of payment, except in the case of a proven error on the part of the company. Synergy Light may deduct up to 10% of the refund for administrative expenses, if applicable.</p>' +
        '</div>' +
        
        '<div class="contract-section">' +
        '<h3>7. Limitations and Conditions</h3>' +
        '<p>The 30% promotional rate applies only to fixed-rate programs, not per-consumption. Charges for special connections, additional services, or damages due to misuse are not included.</p>' +
        '</div>' +
        
        '<div class="contract-section">' +
        '<h3>8. Termination</h3>' +
        '<p>This contract may be terminated by mutual agreement, breach by either party, or expiration of the initial term, upon 5 business days written notice.</p>' +
        '</div>' +
        
        '<div class="contract-section">' +
        '<h3>9. Other Terms and Conditions</h3>' +
        '<p>The parties agree to comply with applicable legal provisions and that any dispute will be resolved in the courts of the corresponding territorial organization.</p>' +
        '<p style="font-size:9px;font-style:italic;margin-top:10px">Texas Business and Commerce Code</p>' +
        '</div>' +
        
        '<div class="signatures">' +
        '<div class="signature-box">' +
        '<div class="signature-line">' +
        '<strong>Supplier\'s signature</strong><br>' +
        '<em style="font-size:18px;color:#000080">Mick Edwards</em><br>' +
        '<small>Gerente - Synergy Light</small>' +
        '</div>' +
        '</div>' +
        '<div class="signature-box">' +
        '<div class="signature-line">' +
        '<strong>Client\'s Signature</strong><br>' +
        factura.clientName +
        '</div>' +
        '</div>' +
        '</div>' +
        
        '<div class="footer">' +
        '<p class="footer-tagline">Ilumina Tu Vida</p>' +
        '<p style="margin:10px 0">Participe de nuestro sistema de Referidos y disfrutarás de tu renovación con el 100% de descuento</p>' +
        '<p style="font-style:italic;font-size:10px">*Ciertas condiciones aplican*</p>' +
        '<p style="margin-top:10px"><a href="https://synergylightservices.com" style="color:#03bc89">synergylightservices.com</a></p>' +
        '<p>📞 +1 (409) 280-0661 | ✉️ synergylightservices@gmail.com</p>' +
        '</div>' +
        
        '</div>' +
        '<script>setTimeout(function(){window.print();},500);<\/script>' +
        '</body></html>';
      
      const printWindow = window.open('', '_blank');
      printWindow.document.write(pdfContent);
      printWindow.document.close();
    }

    // Hacer funciones globales
    window.abrirModalFactura = abrirModalFactura;
    window.cerrarModalFactura = cerrarModalFactura;
    window.calcularTotalFactura = calcularTotalFactura;
    window.guardarYGenerarPDF = guardarYGenerarPDF;
    window.generarPDFContrato = generarPDFContrato;
  </script>

</body>
</html>
