<div id="pdfManagerModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);z-index:9999;overflow-y:auto;">
  <div style="background:linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);margin:3% auto;padding:35px;border:2px solid #03bc89;border-radius:20px;max-width:900px;width:90%;max-height:94vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid rgba(3,188,137,0.3);">
      <h2 style="color:#03bc89;margin:0;font-size:1.8rem">💾 Guardar Documento PDF</h2>
      <button onclick="cerrarModalPDF()" style="background:none;border:none;color:#aaa;font-size:2.5rem;cursor:pointer;">&times;</button>
    </div>
    
    <!-- SELECCIÓN DE CARPETA BASE -->
    <div style="background:rgba(255,255,255,0.05);padding:20px;border-radius:10px;margin-bottom:25px;border:1px solid rgba(3,188,137,0.3);">
      <h3 style="color:#03bc89;margin-bottom:15px;">📁 Carpeta de Documentos</h3>
      <div style="display:flex;gap:10px;align-items:center;">
        <input type="text" id="carpetaBasePath" readonly placeholder="No se ha seleccionado carpeta" 
               style="flex:1;padding:12px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;">
        <button onclick="seleccionarCarpetaBase()" class="btn-primary" style="padding:12px 20px;background:#03bc89;color:white;border:none;border-radius:10px;cursor:pointer;">
          📂 Seleccionar Carpeta
        </button>
      </div>
      <small style="color:#888;margin-top:8px;display:block;">💡 Esta carpeta se guardará y se usará para todas las facturas</small>
    </div>
    
    <!-- SELECCIÓN DE CLIENTE Y FACTURA -->
    <div style="background:rgba(255,255,255,0.05);padding:20px;border-radius:10px;margin-bottom:25px;border:1px solid rgba(3,188,137,0.3);">
      <h3 style="color:#03bc89;margin-bottom:15px;">📋 Documento a Guardar</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px;">
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600;">Cliente:</label>
          <select id="pdfClienteSelect" onchange="cargarFacturasCliente()" style="width:100%;padding:12px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;">
            <option value="">Seleccione un cliente...</option>
          </select>
        </div>
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600;">Factura:</label>
          <select id="pdfFacturaSelect" style="width:100%;padding:12px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;">
            <option value="">Seleccione una factura...</option>
          </select>
        </div>
      </div>
      
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button onclick="generarYGuardarPDF('factura')" class="btn-action" style="padding:12px 20px;background:linear-gradient(135deg, #03bc89 0%, #04d99e 100%);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:600;">
          💾 Guardar Factura
        </button>
        <button onclick="generarYGuardarPDF('contrato')" class="btn-action" style="padding:12px 20px;background:linear-gradient(135deg, #0066cc 0%, #0099ff 100%);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:600;">
          📄 Guardar Contrato
        </button>
      </div>
    </div>
    
    <!-- LISTA DE PDFs GUARDADOS -->
    <div style="background:rgba(255,255,255,0.05);padding:20px;border-radius:10px;border:1px solid rgba(3,188,137,0.3);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <h3 style="color:#03bc89;margin:0;">📂 Documentos Guardados</h3>
        <button onclick="listarPDFsGuardados()" style="padding:8px 15px;background:rgba(3,188,137,0.2);color:#03bc89;border:1px solid #03bc89;border-radius:8px;cursor:pointer;font-size:0.85rem;">
          🔄 Refrescar
        </button>
      </div>
      <div id="listaPDFsGuardados" style="max-height:300px;overflow-y:auto;">
        <div style="text-align:center;padding:40px;color:#666;">
          No hay documentos guardados aún
        </div>
      </div>
    </div>
  </div>
</div>
