<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Administrativo - Synergy Light</title>
  <link rel="icon" type="image/webp" href="fivicon.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="assets/js/database.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(3, 188, 137, 0.3);
      border-radius: 25px;
      padding: 50px 40px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(3, 188, 137, 0.2);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-container { text-align: center; margin-bottom: 30px; }
    .logo-container img {
      max-width: 200px;
      height: auto;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 20px rgba(3, 188, 137, 0.5));
    }
    .login-container h1 {
      color: #FFFFFF;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
    }
    .login-container .subtitle {
      color: #B0B0B0;
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 40px;
    }
    .form-group { margin-bottom: 25px; position: relative; }
    .form-group label {
      display: block;
      color: #03bc89;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .input-wrapper { position: relative; }
    .form-group input {
      width: 100%;
      padding: 15px 50px 15px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(3, 188, 137, 0.3);
      border-radius: 12px;
      color: #FFFFFF;
      font-size: 1rem;
      font-family: 'Montserrat', sans-serif;
      transition: all 0.3s ease;
    }
    .form-group input:focus {
      outline: none;
      border-color: #03bc89;
      box-shadow: 0 0 20px rgba(3, 188, 137, 0.3);
      background: rgba(255, 255, 255, 0.08);
    }
    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #03bc89;
      font-size: 1.2rem;
      user-select: none;
      transition: all 0.3s ease;
    }
    .toggle-password:hover {
      color: #04d99e;
      transform: translateY(-50%) scale(1.1);
    }
    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #03bc89 0%, #04d99e 100%);
      color: #FFFFFF;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Montserrat', sans-serif;
      margin-bottom: 25px;
      box-shadow: 0 8px 25px rgba(3, 188, 137, 0.4);
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(3, 188, 137, 0.6);
    }
    .error-message {
      background: rgba(255, 68, 68, 0.1);
      border: 2px solid rgba(255, 68, 68, 0.3);
      color: #ff4444;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    .links-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      text-align: center;
    }
    .link-item {
      color: #03bc89;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 10px;
      border-radius: 8px;
      display: block;
    }
    .link-item:hover {
      color: #04d99e;
      background: rgba(3, 188, 137, 0.1);
      transform: translateY(-2px);
    }
    @media (max-width: 480px) {
      .login-container { padding: 40px 25px; }
      .login-container h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-container">
      <img src="assets/images/logo/synergy-light.webp" alt="Synergy Light">
    </div>
    <h1>Panel Administrativo</h1>
    <p class="subtitle">Acceso restringido</p>
    <div class="error-message" id="errorMessage"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="admin@synergylight.com" required autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          <span class="toggle-password" id="togglePassword">👁️</span>
        </div>
      </div>
      <button type="submit" class="btn-login">Ingresar</button>
    </form>
    <div class="links-container">
      <a href="#" class="link-item" id="createAccountLink">Crear cuenta</a>
      <a href="#" class="link-item" id="forgotPasswordLink">¿Olvidaste tu contraseña?</a>
    </div>
  </div>
  <script>
    // Toggle Password
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
    });

    // Login Form - Credenciales hardcodeadas para Live Server
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = passwordInput.value;
      
      // Usar base de datos local
      const user = DB.validateUser(email, password);
      
      if (user) {
        localStorage.setItem('adminLoggedIn', 'true');
        localStorage.setItem('adminEmail', email);
        localStorage.setItem('adminRole', user.role);
        window.location.href = 'dashboard.html';
      } else {
        errorMessage.textContent = 'Email o contraseña incorrectos';
        errorMessage.style.display = 'block';
        setTimeout(() => { errorMessage.style.display = 'none'; }, 5000);
      }
    });

    // Verificar si ya está logueado
    if (localStorage.getItem('adminLoggedIn') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
