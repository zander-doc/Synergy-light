<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Synergy Light</title>
  <link rel="icon" type="image/webp" href="../fivicon.webp">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #FFFFFF;
      min-height: 100vh;
    }
    .dashboard-container { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(20px);
      border-right: 2px solid rgba(3, 188, 137, 0.2);
      padding: 30px 0;
      position: fixed;
      height: 100vh;
    }
    .sidebar-header { text-align: center; padding: 0 20px 30px; border-bottom: 1px solid rgba(3, 188, 137, 0.2); margin-bottom: 30px; }
    .sidebar-header h2 { color: #03bc89; font-size: 1.5rem; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 5px; padding: 0 15px; }
    .nav-item {
      display: flex; align-items: center; gap: 15px;
      padding: 15px 20px; color: #B0B0B0; text-decoration: none;
      border-radius: 12px; transition: all 0.3s ease;
    }
    .nav-item:hover { background: rgba(3, 188, 137, 0.1); color: #FFFFFF; }
    .nav-item.active { background: linear-gradient(135deg, rgba(3, 188, 137, 0.2) 0%, rgba(4, 217, 158, 0.1) 100%); color: #03bc89; border: 1px solid rgba(3, 188, 137, 0.3); }
    .main-content { margin-left: 260px; flex: 1; padding: 30px; }
    
    .clientes-container { max-width: 1400px; margin: 0 auto; }
    .header-section {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 30px; padding-bottom: 20px;
      border-bottom: 2px solid rgba(3, 188, 137, 0.2);
    }
    .header-section h1 { color: #03bc89; font-size: 2rem; }
    
    .btn-primary {
      padding: 12px 24px;
      background: linear-gradient(135deg, #03bc89 0%, #04d99e 100%);
      color: white; border: none; border-radius: 10px;
      cursor: pointer; font-weight: 700; font-size: 1rem;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(3, 188, 137, 0.4);
    }
    
    .table-header {
      display: grid;
      grid-template-columns: 1.5fr 2.5fr 1.5fr 1.5fr 1.5fr 2fr;
      gap: 15px;
      padding: 15px 20px;
      background: rgba(3, 188, 137, 0.1);
      border: 2px solid rgba(3, 188, 137, 0.3);
      border-radius: 10px;
      margin-bottom: 15px;
      font-weight: 700;
      color: #03bc89;
    }
    
    .cliente-row {
      display: grid;
      grid-template-columns: 1.5fr 2.5fr 1.5fr 1.5fr 1.5fr 2fr;
      gap: 15px;
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(3, 188, 137, 0.2);
      border-radius: 10px;
      margin-bottom: 10px;
      align-items: center;
      transition: all 0.3s ease;
    }
    .cliente-row:hover {
      background: rgba(3, 188, 137, 0.05);
      transform: translateX(5px);
      border-color: rgba(3, 188, 137, 0.5);
    }
    
    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-block;
    }
    .status-badge.active { background: rgba(3, 188, 137, 0.2); color: #03bc89; }
    .status-badge.warning { background: rgba(255, 165, 0, 0.2); color: #FFA500; }
    .status-badge.secondary { background: rgba(176, 176, 176, 0.2); color: #B0B0B0; }
    
    .btn-action {
      padding: 8px 12px;
      margin: 0 3px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-edit { background: rgba(255, 165, 0, 0.2); color: #FFA500; }
    .btn-edit:hover { background: rgba(255, 165, 0, 0.3); transform: scale(1.05); }
    .btn-whatsapp { background: rgba(37, 211, 102, 0.2); color: #25d366; }
    .btn-whatsapp:hover { background: rgba(37, 211, 102, 0.3); transform: scale(1.05); }
    .btn-email { background: rgba(0, 102, 204, 0.2); color: #0066cc; }
    .btn-email:hover { background: rgba(0, 102, 204, 0.3); transform: scale(1.05); }
    .btn-delete { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
    .btn-delete:hover { background: rgba(255, 68, 68, 0.3); transform: scale(1.05); }
    .btn-factura { background: rgba(3, 188, 137, 0.2); color: #03bc89; }
    .btn-factura:hover { background: rgba(3, 188, 137, 0.3); transform: scale(1.05); }
    
    /* MODAL COMPACTO Y CENTRADO - CORREGIDO */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      z-index: 9999;
      overflow-y: auto;
    }
    .modal-content {
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      margin: 5% auto;
      padding: 35px;
      border: 2px solid #03bc89;
      border-radius: 20px;
      max-width: 800px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(3, 188, 137, 0.4);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid rgba(3, 188, 137, 0.3);
    }
    .modal-header h2 {
      color: #03bc89;
      margin: 0;
      font-size: 1.8rem;
    }
    .btn-close {
      background: none;
      border: none;
      color: #aaa;
      font-size: 2.5rem;
      cursor: pointer;
      line-height: 1;
      transition: all 0.3s ease;
    }
    .btn-close:hover {
      color: #ff4444;
      transform: scale(1.2) rotate(90deg);
    }
    
    /* FORMULARIO CON GRID CORREGIDO */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group.full-width {
      grid-column: 1 / -1;
    }
    .form-group label {
      display: block;
      color: #03bc89;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 15px;
      background: rgba(42, 42, 42, 0.8);
      border: 2px solid rgba(3, 188, 137, 0.3);
      color: white;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #03bc89;
      box-shadow: 0 0 15px rgba(3, 188, 137, 0.3);
    }
    .form-group input[readonly] {
      background: rgba(10, 58, 42, 0.8);
      color: #03bc89;
      cursor: not-allowed;
      font-weight: bold;
    }
    .form-actions {
      margin-top: 30px;
      padding-top: 25px;
      border-top: 2px solid rgba(3, 188, 137, 0.2);
      display: flex;
      gap: 15px;
      justify-content: flex-end;
    }
    .btn-cancel {
      padding: 14px 30px;
      background: rgba(102, 102, 102, 0.8);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .btn-cancel:hover {
      background: rgba(102, 102, 102, 1);
      transform: translateY(-2px);
    }
    .btn-save {
      padding: 14px 30px;
      background: linear-gradient(135deg, #03bc89 0%, #04d99e 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(3, 188, 137, 0.3);
    }
    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(3, 188, 137, 0.4);
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .empty-state h3 { color: #03bc89; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Synergy Light</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="clients.html" class="nav-item active">👥 Clientes</a>
        <a href="invoices.html" class="nav-item">💰 Facturación</a>
        <a href="#" class="nav-item">📦 Inventario</a>
        <a href="#" class="nav-item">📈 Reportes</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="clientes-container">
        <div class="header-section">
          <h1>Clientes</h1>
          <button class="btn-primary" onclick="abrirModalNuevoCliente()">+ Nuevo Cliente</button>
        </div>

        <div class="table-header">
          <div>ID CLIENTE</div>
          <div>NOMBRE</div>
          <div>TELÉFONO</div>
          <div>CONTRATO</div>
          <div>STATUS</div>
          <div>ACCIONES</div>
        </div>
        <div id="clientesContent">
          <!-- Los clientes se cargarán aquí -->
        </div>
      </div>
    </main>
  </div>

  <!-- MODAL NUEVO/EDITAR CLIENTE - CORREGIDO -->
  <div id="modalCliente" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">➕ Nuevo Cliente</h2>
        <button class="btn-close" onclick="cerrarModalCliente()">&times;</button>
      </div>
      
      <form id="formCliente">
        <div class="form-grid">
          <!-- CAMPO 1: NOMBRE (PRIMERO - FULL WIDTH) -->
          <div class="form-group full-width">
            <label for="clienteNombre">Nombre Completo *</label>
            <input type="text" id="clienteNombre" required placeholder="Ej: Alexander Garcia">
            <small style="color: #03bc89; margin-top: 5px; display: block;">💡 El ID se generará automáticamente</small>
          </div>
          
          <!-- CAMPO 2: ID CLIENTE (AUTO-GENERADO) -->
          <div class="form-group">
            <label for="clienteId">ID Cliente</label>
            <input type="text" id="clienteId" readonly placeholder="Auto-generado">
          </div>
          
          <!-- TELÉFONO -->
          <div class="form-group">
            <label for="clienteTelefono">Teléfono *</label>
            <input type="tel" id="clienteTelefono" required placeholder="Ej: 8174894853">
          </div>
          
          <!-- DIRECCIÓN (FULL WIDTH) -->
          <div class="form-group full-width">
            <label for="clienteDireccion">Dirección *</label>
            <input type="text" id="clienteDireccion" required placeholder="Ej: 1563 Sandy Ln Apt 121, Fort Worth, TX, 76112">
          </div>
          
          <!-- EMAIL -->
          <div class="form-group">
            <label for="clienteEmail">Email</label>
            <input type="email" id="clienteEmail" placeholder="cliente@email.com">
          </div>
          
          <!-- TIPO DE CONTRATO -->
          <div class="form-group">
            <label for="clienteContrato">Tipo de Contrato *</label>
            <select id="clienteContrato" required>
              <option value="">Seleccione...</option>
              <option value="TARIFA KWH">TARIFA KWH</option>
              <option value="TARIFA FIJA">TARIFA FIJA</option>
            </select>
          </div>
          
          <!-- SSID -->
          <div class="form-group">
            <label for="clienteSsid">SSID *</label>
            <input type="text" id="clienteSsid" required placeholder="Ej: 10443720002157800">
          </div>
          
          <!-- AGENTE DE VENTAS -->
          <div class="form-group">
            <label for="clienteAgente">Agente de Ventas *</label>
            <select id="clienteAgente" required>
              <option value="">Seleccione...</option>
              <option value="AGENTE CARMEN VARGAS">AGENTE CARMEN VARGAS</option>
              <option value="AGENTE EMMA GARCIA">AGENTE EMMA GARCIA</option>
              <option value="AGENTE LUCY HERNANDEZ">AGENTE LUCY HERNANDEZ</option>
            </select>
          </div>
          
          <!-- MÉTODO DE PAGO -->
          <div class="form-group">
            <label for="clientePago">Método de Pago *</label>
            <select id="clientePago" required>
              <option value="">Seleccione...</option>
              <option value="ZELLE">ZELLE</option>
              <option value="CASHAPP">CASHAPP</option>
              <option value="LINK DE PAGO">LINK DE PAGO</option>
            </select>
          </div>
          
          <!-- DEPÓSITO -->
          <div class="form-group">
            <label for="clienteDeposito">Depósito ($)</label>
            <input type="number" id="clienteDeposito" value="50" min="0" step="0.01">
          </div>
          
          <!-- FECHA INICIO -->
          <div class="form-group">
            <label for="clienteFechaInicio">Fecha de Inicio *</label>
            <input type="date" id="clienteFechaInicio" required>
          </div>
          
          <!-- FECHA FIN -->
          <div class="form-group">
            <label for="clienteFechaFin">Fecha de Fin *</label>
            <input type="date" id="clienteFechaFin" required>
          </div>
          
          <!-- STATUS -->
          <div class="form-group">
            <label for="clienteStatus">Status *</label>
            <select id="clienteStatus" required>
              <option value="">Seleccione...</option>
              <option value="ACTIVO">ACTIVO</option>
              <option value="POR DESCONECTAR">POR DESCONECTAR</option>
              <option value="SIN CONEXIÓN">SIN CONEXIÓN</option>
            </select>
          </div>
        </div>
        
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="cerrarModalCliente()">Cancelar</button>
          <button type="submit" class="btn-save">💾 Guardar Cliente</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ===============================
    // VARIABLE GLOBAL PARA MODO EDICIÓN
    // ===============================
    let clienteEditandoId = null;
    
    // ===============================
    // FUNCIONES GLOBALES
    // ===============================
    
    function abrirModalNuevoCliente() {
      document.getElementById('modalTitle').textContent = '➕ Nuevo Cliente';
      document.getElementById('formCliente').reset();
      document.getElementById('clienteId').value = '';
      document.getElementById('modalCliente').style.display = 'block';
      document.body.style.overflow = 'hidden';
    }
    
    function cerrarModalCliente() {
      document.getElementById('modalCliente').style.display = 'none';
      document.body.style.overflow = 'auto';
      document.getElementById('formCliente').reset();
    }
    
    window.onclick = function(event) {
      const modal = document.getElementById('modalCliente');
      if (event.target === modal) {
        cerrarModalCliente();
      }
    }
    
    // ===============================
    // GENERADOR DE ID
    // ===============================
    
    function generarIdCliente(nombreCompleto) {
      if (!nombreCompleto || nombreCompleto.trim().length < 3) {
        return '';
      }
      
      const partes = nombreCompleto.trim().toUpperCase().split(/\s+/);
      
      if (partes.length < 2) {
        return partes[0].substring(0, 3).toUpperCase() + '-0100';
      }
      
      const primerNombre = partes[0];
      const apellido = partes[partes.length - 1];
      
      const codigoNombre = primerNombre.charAt(0) + primerNombre.slice(-2).toUpperCase();
      const codigoApellido = apellido.charAt(0);
      
      const clientes = JSON.parse(localStorage.getItem('clients') || '[]');
      let contador = 100;
      let idUnico = false;
      let nuevoId = '';
      
      while (!idUnico && contador < 10000) {
        contador++;
        const numero = contador.toString().padStart(4, '0');
        nuevoId = `${codigoNombre}${codigoApellido}-${numero}`;
        
        const existe = clientes.find(c => c.clientId === nuevoId);
        if (!existe) {
          idUnico = true;
        }
      }
      
      return nuevoId;
    }
    
    document.getElementById('clienteNombre').addEventListener('input', function() {
      const nombre = this.value.trim();
      if (nombre.length >= 3) {
        const generatedId = generarIdCliente(nombre);
        document.getElementById('clienteId').value = generatedId;
      } else {
        document.getElementById('clienteId').value = '';
      }
    });
    
    // ===============================
    // GUARDAR CLIENTE - CORREGIDO
    // ===============================
    
    document.getElementById('formCliente').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const clientId = document.getElementById('clienteId').value;
      const nombre = document.getElementById('clienteNombre').value.trim();
      const telefono = document.getElementById('clienteTelefono').value.trim();
      const direccion = document.getElementById('clienteDireccion').value.trim();
      const email = document.getElementById('clienteEmail').value.trim();
      const contrato = document.getElementById('clienteContrato').value;
      const ssid = document.getElementById('clienteSsid').value.trim();
      const agente = document.getElementById('clienteAgente').value;
      const pago = document.getElementById('clientePago').value;
      const deposito = parseFloat(document.getElementById('clienteDeposito').value) || 50;
      const fechaInicio = document.getElementById('clienteFechaInicio').value;
      const fechaFin = document.getElementById('clienteFechaFin').value;
      const status = document.getElementById('clienteStatus').value;
      
      if (!nombre || !telefono || !direccion || !contrato || !ssid || !agente || !pago || !fechaInicio || !fechaFin || !status) {
        alert('❌ Por favor complete todos los campos obligatorios marcados con *');
        return;
      }
      
      const clientes = JSON.parse(localStorage.getItem('clients') || '[]');
      
      // MODO EDICIÓN
      if (clienteEditandoId) {
        const index = clientes.findIndex(c => c.clientId === clienteEditandoId);
        if (index !== -1) {
          clientes[index] = {
            clientId: clienteEditandoId,
            name: nombre,
            phone: telefono,
            email: email,
            address: direccion,
            contractType: contrato,
            ssid: ssid,
            salesAgent: agente,
            paymentMethod: pago,
            deposit: deposito,
            startDate: fechaInicio,
            endDate: fechaFin,
            status: status
          };
          localStorage.setItem('clients', JSON.stringify(clientes));
          alert('✅ Cliente actualizado exitosamente\n\nID: ' + clienteEditandoId + '\nNombre: ' + nombre);
          clienteEditandoId = null;
          cerrarModalCliente();
          cargarClientes();
        }
        return;
      }
      
      // MODO CREACIÓN
      const existeMismoNombre = clientes.find(c => 
        c.name.toLowerCase() === nombre.toLowerCase() && 
        c.phone === telefono
      );
      
      if (existeMismoNombre) {
        alert('⚠️ Ya existe un cliente registrado con este nombre y teléfono.\n\nCliente existente:\nID: ' + existeMismoNombre.clientId + '\nNombre: ' + existeMismoNombre.name);
        return;
      }
      
      const newClient = {
        clientId: clientId || generarIdCliente(nombre),
        name: nombre,
        phone: telefono,
        email: email,
        address: direccion,
        contractType: contrato,
        ssid: ssid,
        salesAgent: agente,
        paymentMethod: pago,
        deposit: deposito,
        startDate: fechaInicio,
        endDate: fechaFin,
        status: status
      };
      
      clientes.push(newClient);
      localStorage.setItem('clients', JSON.stringify(clientes));
      
      alert('✅ Cliente guardado exitosamente\n\nID: ' + newClient.clientId + '\nNombre: ' + newClient.name);
      
      cerrarModalCliente();
      cargarClientes();
    });
    
    // ===============================
    // CARGAR CLIENTES
    // ===============================
    
    function cargarClientes() {
      const clientes = JSON.parse(localStorage.getItem('clients') || '[]');
      const content = document.getElementById('clientesContent');
      
      if (clientes.length === 0) {
        content.innerHTML = '<div class="empty-state"><h3>📋 No hay clientes registrados</h3><p>Haga clic en "+ Nuevo Cliente" para comenzar</p></div>';
        return;
      }
      
      content.innerHTML = clientes.map(client => {
        let statusClass = 'secondary';
        if (client.status === 'ACTIVO') statusClass = 'active';
        else if (client.status === 'POR DESCONECTAR') statusClass = 'warning';
        
        return `
          <div class="cliente-row">
            <div style="font-weight: 600; color: #03bc89;">${client.clientId}</div>
            <div>${client.name}</div>
            <div>${client.phone}</div>
            <div>${client.contractType}</div>
            <div><span class="status-badge ${statusClass}">${client.status}</span></div>
            <div style="display: flex; gap: 5px; justify-content: center;">
              <button class="btn-action btn-edit" onclick="editarCliente('${client.clientId}')" title="Editar">✏️</button>
              <button class="btn-action btn-factura" onclick="abrirModalFactura('${client.clientId}')" title="Generar Factura">📄</button>
              <button class="btn-action btn-whatsapp" onclick="enviarWhatsApp('${client.phone}', '${client.name}')" title="WhatsApp">💬</button>
              <button class="btn-action btn-email" onclick="enviarEmail('${client.email}', '${client.name}')" title="Email">📧</button>
              <button class="btn-action btn-delete" onclick="eliminarCliente('${client.clientId}')" title="Eliminar">🗑️</button>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // ===============================
    // EDITAR CLIENTE - CORREGIDO
    // ===============================
    
    function editarCliente(clientId) {
      console.log('✏️ Editando cliente:', clientId);
      
      const clientes = JSON.parse(localStorage.getItem('clients') || '[]');
      const client = clientes.find(c => c.clientId === clientId);
      
      if (!client) {
        alert('❌ Cliente no encontrado');
        return;
      }
      
      // Establecer modo edición
      clienteEditandoId = clientId;
      
      // Actualizar título
      document.getElementById('modalTitle').textContent = '✏️ Editar Cliente';
      
      // Rellenar TODOS los campos
      document.getElementById('clienteId').value = client.clientId;
      document.getElementById('clienteNombre').value = client.name;
      document.getElementById('clienteTelefono').value = client.phone;
      document.getElementById('clienteDireccion').value = client.address;
      document.getElementById('clienteEmail').value = client.email || '';
      document.getElementById('clienteContrato').value = client.contractType;
      document.getElementById('clienteSsid').value = client.ssid;
      document.getElementById('clienteAgente').value = client.salesAgent;
      document.getElementById('clientePago').value = client.paymentMethod;
      document.getElementById('clienteDeposito').value = client.deposit || 50;
      document.getElementById('clienteFechaInicio').value = client.startDate;
      document.getElementById('clienteFechaFin').value = client.endDate;
      document.getElementById('clienteStatus').value = client.status;
      
      // Mostrar modal
      document.getElementById('modalCliente').style.display = 'block';
      document.body.style.overflow = 'hidden';
      
      console.log('✅ Modal de edición abierto con datos cargados');
    }
    
    // ===============================
    // ELIMINAR CLIENTE - CORREGIDO
    // ===============================
    
    function eliminarCliente(clientId) {
      if (!confirm('⚠️ ¿Está seguro de eliminar este cliente?\n\nEsta acción no se puede deshacer.')) {
        return;
      }
      
      let clientes = JSON.parse(localStorage.getItem('clients') || '[]');
      const antes = clientes.length;
      clientes = clientes.filter(c => c.clientId !== clientId);
      
      if (clientes.length === antes) {
        alert('❌ Error: Cliente no encontrado');
        return;
      }
      
      localStorage.setItem('clients', JSON.stringify(clientes));
      alert('✅ Cliente eliminado exitosamente');
      cargarClientes();
    }
    
    // ===============================
    // ENVIAR WHATSAPP - NÚMERO CORREGIDO
    // ===============================
    
    function enviarWhatsApp(phone, name) {
      const synergyPhone = '14092800661'; // +1 (409) 280-0661
      const message = `Hola ${name}, le contactamos de Synergy Light. ¿En qué podemos ayudarle?`;
      const encodedMessage = encodeURIComponent(message);
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      
      let url;
      if (isMobile) {
        url = `https://wa.me/${synergyPhone}?text=${encodedMessage}`;
      } else {
        url = `https://web.whatsapp.com/send?phone=${synergyPhone}&text=${encodedMessage}`;
      }
      
      window.open(url, '_blank');
    }
    
    // ===============================
    // ENVIAR EMAIL
    // ===============================
    
    function enviarEmail(email, name) {
      if (!email) {
        alert('⚠️ Este cliente no tiene email registrado');
        return;
      }
      
      const synergyEmail = 'synergylightservices@gmail.com';
      const subject = `Información de Servicio - Synergy Light`;
      const body = `Estimado/a ${name},\n\nEsperamos que se encuentre bien.\n\nNos ponemos en contacto con usted desde Synergy Light.\n\n📞 +1 (409) 280-0661\n✉️ synergylightservices@gmail.com\n\nSaludos cordiales,\nSynergy Light`;
      
      const mailtoUrl = `mailto:${synergyEmail}?to=${email}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.open(mailtoUrl, '_blank');
    }
    
    // ===============================
    // INICIALIZAR
    // ===============================
    
    window.addEventListener('load', function() {
      console.log('🚀 Cargando clientes...');
      cargarClientes();
      console.log('✅ Clientes cargados correctamente');
    });
    
    window.abrirModalNuevoCliente = abrirModalNuevoCliente;
    window.cerrarModalCliente = cerrarModalCliente;
    window.editarCliente = editarCliente;
    window.eliminarCliente = eliminarCliente;
    window.enviarWhatsApp = enviarWhatsApp;
    window.enviarEmail = enviarEmail;
    
    // ===============================
    // SISTEMA DE FACTURACIÓN
    // ===============================
    
    function abrirModalFactura(clientId) {
      console.log('📄 Abriendo modal de factura para:', clientId);
      
      const clientes = JSON.parse(localStorage.getItem('clients') || '[]');
      const client = clientes.find(c => c.clientId === clientId);
      
      if (!client) {
        alert('❌ Cliente no encontrado');
        return;
      }
      
      let modal = document.getElementById('modalFactura');
      
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'modalFactura';
        modal.className = 'modal-overlay';
        modal.style.cssText = 'display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);z-index:9999;overflow-y:auto;';
        
        modal.innerHTML = `
          <div class="modal-content">
            <div class="modal-header">
              <h2>📄 Generar Factura</h2>
              <button class="btn-close" onclick="cerrarModalFactura()">&times;</button>
            </div>
            
            <form id="formFactura">
              <div class="form-grid">
                <div class="form-group">
                  <label for="facturaNumero">Número de Factura *</label>
                  <input type="text" id="facturaNumero" required placeholder="Ej: 39">
                </div>
                <div class="form-group">
                  <label for="facturaCliente">Cliente</label>
                  <input type="text" id="facturaCliente" value="${client.name}" readonly>
                  <input type="hidden" id="facturaClientId" value="${client.clientId}">
                </div>
                <div class="form-group">
                  <label for="facturaFecha">Fecha de Emisión *</label>
                  <input type="date" id="facturaFecha" required>
                </div>
                <div class="form-group">
                  <label for="facturaFechaVenc">Fecha de Vencimiento *</label>
                  <input type="date" id="facturaFechaVenc" required>
                </div>
                <div class="form-group">
                  <label for="facturaIngreso">Ingreso ($)</label>
                  <input type="number" id="facturaIngreso" step="0.01" value="50" oninput="calcularTotalFactura()">
                </div>
                <div class="form-group">
                  <label for="facturaCostos">Costos Fijos ($)</label>
                  <input type="number" id="facturaCostos" step="0.01" value="45" oninput="calcularTotalFactura()">
                </div>
                <div class="form-group">
                  <label for="facturaDeposito">Depósito ($)</label>
                  <input type="number" id="facturaDeposito" step="0.01" value="${client.deposit || 50}" oninput="calcularTotalFactura()">
                </div>
                <div class="form-group">
                  <label for="facturaTotal">TOTAL ($)</label>
                  <input type="number" id="facturaTotal" readonly style="font-weight:bold;font-size:1.2rem;background:rgba(10,58,42,0.8);color:#03bc89;border:2px solid #03bc89;">
                </div>
                <div class="form-group">
                  <label for="facturaStatus">Estado</label>
                  <select id="facturaStatus">
                    <option value="PENDIENTE">PENDIENTE</option>
                    <option value="PAGADA">PAGADA</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="facturaMetodoPago">Método de Pago</label>
                  <select id="facturaMetodoPago">
                    <option value="ZELLE">ZELLE</option>
                    <option value="CASHAPP">CASHAPP</option>
                    <option value="LINK DE PAGO">LINK DE PAGO</option>
                  </select>
                </div>
              </div>
              
              <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="cerrarModalFactura()">Cancelar</button>
                <button type="submit" class="btn-save">💾 Guardar Factura</button>
              </div>
            </form>
          </div>
        `;
        
        document.body.appendChild(modal);
      }
      
      modal.style.display = 'block';
      document.body.style.overflow = 'hidden';
      
      const hoy = new Date().toISOString().split('T')[0];
      const facturaFecha = document.getElementById('facturaFecha');
      const facturaFechaVenc = document.getElementById('facturaFechaVenc');
      
      if (facturaFecha) facturaFecha.value = hoy;
      
      if (facturaFechaVenc) {
        const vencimiento = new Date();
        vencimiento.setDate(vencimiento.getDate() + 30);
        facturaFechaVenc.value = vencimiento.toISOString().split('T')[0];
      }
      
      calcularTotalFactura();
      
      const form = document.getElementById('formFactura');
      form.onsubmit = function(e) {
        e.preventDefault();
        guardarFactura(client);
      };
      
      console.log('✅ Modal de factura abierto');
    }
    
    function calcularTotalFactura() {
      const ingreso = parseFloat(document.getElementById('facturaIngreso')?.value) || 0;
      const costos = parseFloat(document.getElementById('facturaCostos')?.value) || 0;
      const deposito = parseFloat(document.getElementById('facturaDeposito')?.value) || 0;
      const total = ingreso + costos + deposito;
      
      const totalInput = document.getElementById('facturaTotal');
      if (totalInput) {
        totalInput.value = total.toFixed(2);
      }
    }
    
    function cerrarModalFactura() {
      const modal = document.getElementById('modalFactura');
      if (modal) {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
      }
    }
    
    function guardarFactura(client) {
      const facturaData = {
        invoiceNumber: document.getElementById('facturaNumero')?.value || '',
        clientId: document.getElementById('facturaClientId')?.value || client.clientId,
        clientName: client.name,
        issueDate: document.getElementById('facturaFecha')?.value || '',
        dueDate: document.getElementById('facturaFechaVenc')?.value || '',
        income: parseFloat(document.getElementById('facturaIngreso')?.value) || 0,
        fixedCosts: parseFloat(document.getElementById('facturaCostos')?.value) || 0,
        deposit: parseFloat(document.getElementById('facturaDeposito')?.value) || 0,
        total: parseFloat(document.getElementById('facturaTotal')?.value) || 0,
        status: document.getElementById('facturaStatus')?.value || 'PENDIENTE',
        paymentMethod: document.getElementById('facturaMetodoPago')?.value || ''
      };
      
      if (!facturaData.invoiceNumber || !facturaData.clientId) {
        alert('❌ Por favor complete los campos obligatorios');
        return;
      }
      
      const invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
      invoices.push(facturaData);
      localStorage.setItem('invoices', JSON.stringify(invoices));
      
      alert('✅ Factura guardada exitosamente\nNúmero: ' + facturaData.invoiceNumber);
      
      cerrarModalFactura();
      console.log('Factura guardada:', facturaData);
    }
    
    // Hacer funciones globales
    window.abrirModalFactura = abrirModalFactura;
    window.cerrarModalFactura = cerrarModalFactura;
    window.calcularTotalFactura = calcularTotalFactura;
    window.guardarFactura = guardarFactura;
  </script>
</body>
</html>
