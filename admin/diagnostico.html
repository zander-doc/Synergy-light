<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Diagnóstico Synergy Light</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff88; }
    .error { color: #ff4444; }
    .ok { color: #03bc89; }
    button { padding: 10px; margin: 5px; background: #03bc89; color: #fff; border: none; cursor: pointer; }
    pre { background: #0a0a0a; padding: 10px; border: 1px solid #03bc89; }
  </style>
</head>
<body>
  <h1>🔍 Diagnóstico del Sistema</h1>
  <button onclick="runDiagnostics()">Ejecutar Diagnóstico</button>
  <pre id="output">Haz clic en el botón para iniciar...</pre>

  <script>
    async function runDiagnostics() {
      const output = document.getElementById('output');
      let log = '';
      
      function add(msg, type = '') {
        log += `<span class="${type}">${msg}\n</span>`;
        output.innerHTML = log;
      }
      
      // 1. Verificar localStorage
      add('\n📦 1. LOCALSTORAGE:', 'ok');
      const clients = localStorage.getItem('clients');
      add(`  clients: ${clients ? clients.substring(0, 100) + '...' : 'VACÍO'}`, clients ? 'ok' : 'error');
      
      const invoices = localStorage.getItem('invoices');
      add(`  invoices: ${invoices ? invoices.substring(0, 100) + '...' : 'VACÍO'}`, invoices ? 'ok' : 'error');
      
      // 2. Verificar funciones globales
      add('\n🔧 2. FUNCIONES GLOBALES:', 'ok');
      const funcs = ['generateClientId', 'generateInvoiceNumber', 'openWhatsAppMenu', 'sendWhatsApp', 'renderClients', 'saveClient'];
      funcs.forEach(fn => {
        const exists = typeof window[fn] === 'function';
        add(`  ${fn}: ${exists ? '✅ DEFINIDA' : '❌ NO ENCONTRADA'}`, exists ? 'ok' : 'error');
      });
      
      // 3. Verificar fetch de modales
      add('\n🌐 3. FETCH DE MODALES:', 'ok');
      try {
        const res1 = await fetch('components/modals/new-client.html');
        add(`  new-client.html: ${res1.ok ? '✅ 200 OK' : '❌ ' + res1.status}`, res1.ok ? 'ok' : 'error');
      } catch(e) {
        add(`  new-client.html: ❌ ERROR - ${e.message}`, 'error');
      }
      
      try {
        const res2 = await fetch('components/modals/invoice-modal.html');
        add(`  invoice-modal.html: ${res2.ok ? '✅ 200 OK' : '❌ ' + res2.status}`, res2.ok ? 'ok' : 'error');
      } catch(e) {
        add(`  invoice-modal.html: ❌ ERROR - ${e.message}`, 'error');
      }
      
      // 4. Probar generateClientId
      add('\n🧪 4. PRUEBA generateClientId():', 'ok');
      try {
        const testId = generateClientId('Juan Pérez');
        add(`  generateClientId('Juan Pérez') = ${testId}`, 'ok');
      } catch(e) {
        add(`  ❌ ERROR: ${e.message}`, 'error');
      }
      
      // 5. Verificar DOM
      add('\n📄 5. ELEMENTOS DEL DOM:', 'ok');
      const modal = document.getElementById('newClientModal');
      add(`  newClientModal: ${modal ? '✅ EXISTE' : '❌ NO EXISTE'}`, modal ? 'ok' : 'error');
      
      const sidebar = document.getElementById('sidebar');
      add(`  sidebar: ${sidebar ? '✅ EXISTE' : '❌ NO EXISTE'}`, sidebar ? 'ok' : 'error');
      
      const header = document.getElementById('header');
      add(`  header: ${header ? '✅ EXISTE' : '❌ NO EXISTE'}`, header ? 'ok' : 'error');
      
      add('\n✅ Diagnóstico completado', 'ok');
    }
  </script>
</body>
</html>
