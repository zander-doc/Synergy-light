<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synergy Light – Login</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin.css">
</head>

<body class="login-body">

  <div class="login-container">
    <h1 class="login-title">Synergy Light</h1>
    <h2 class="login-subtitle">Panel Administrativo</h2>

    <form id="loginForm" class="login-form">

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@synergylight.com" required>
      </div>

      <div class="form-group password-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required>

        <span id="togglePassword" class="password-toggle">
          <i class="eye-icon">👁️</i>
          <i class="eye-off-icon" style="display:none;">🙈</i>
        </span>
      </div>

      <div class="form-group remember-group">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">Recordarme</label>
      </div>

      <p id="loginError" class="error-message" style="display:none;"></p>

      <button type="submit" class="btn-primary login-btn">Ingresar</button>

      <a href="#" id="forgotPasswordLink" class="forgot-link">¿Olvidaste tu contraseña?</a>
    </form>
  </div>

  <!-- Modal recuperar contraseña se carga dinámicamente -->
  <script src="js/login.js"></script>
</body>
</html>
