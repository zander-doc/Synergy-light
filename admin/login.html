<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso - Synergy Light Admin</title>
  <link rel="icon" type="image/webp" href="../favicon.webp">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial;background:#0a0a0a;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-container{background:#1a1a1a;border:2px solid #03bc89;border-radius:20px;padding:40px;max-width:450px;width:100%}
    .logo{text-align:center;margin-bottom:30px}
    .logo h1{color:#03bc89;font-size:32px}
    .form-title{color:#fff;margin-bottom:25px;text-align:center}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;color:#03bc89;margin-bottom:8px}
    .form-group input{width:100%;padding:12px;background:#2a2a2a;border:1px solid #03bc89;border-radius:8px;color:#fff}
    .btn-primary{width:100%;padding:14px;background:#03bc89;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px;margin-top:10px}
    .btn-secondary{width:100%;padding:12px;background:0 0;color:#03bc89;border:2px solid #03bc89;border-radius:8px;cursor:pointer;margin-top:10px}
    .message{padding:12px;border-radius:8px;margin-bottom:15px;text-align:center;display:none}
    .message.error{background:rgba(255,68,68,0.1);color:#ff4444}
    .message.success{background:rgba(3,188,137,0.1);color:#03bc89}
    .toggle-form{text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid rgba(3,188,137,0.3);color:#888;font-size:14px}
    .toggle-form a{color:#03bc89;cursor:pointer}
    .footer{text-align:center;margin-top:25px;color:#666;font-size:12px}
    .hidden{display:none}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:40px}
    .pw-toggle{position:absolute;right:10px;top:10px;background:none;border:none;color:#888;cursor:pointer;font-size:18px}
  </style>
</head>
<body>
  <a href="../index.html" style="position:absolute;top:20px;left:20px;color:#03bc89;text-decoration:none;font-size:14px">← Volver al sitio</a>
  <div class="login-container">
    <div class="logo"><h1>SYNERGY LIGHT</h1><p>Panel Administrativo</p></div>
    <div id="loginSection">
      <h2 class="form-title">Iniciar Sesion</h2>
      <div class="message error" id="loginError"></div>
      <form id="loginForm">
        <div class="form-group"><label>Usuario</label><input type="text" id="loginUser" required autocomplete="username"></div>
        <div class="form-group"><label>Contrasena</label><div class="pw-wrap"><input type="password" id="loginPass" required autocomplete="current-password"><button type="button" class="pw-toggle" onclick="togglePass('loginPass',this)">&#128065;</button></div></div>
        <button type="submit" class="btn-primary">Ingresar</button>
      </form>
      <div class="toggle-form">¿No tienes cuenta? <a onclick="showRegister()">Crear usuario</a></div>
    </div>
    <div id="registerSection" class="hidden">
      <h2 class="form-title">Crear Usuario</h2>
      <div class="message error" id="registerError"></div>
      <div class="message success" id="registerSuccess"></div>
      <form id="registerForm">
        <div class="form-group"><label>Nombre</label><input type="text" id="regName" required></div>
        <div class="form-group"><label>Usuario</label><input type="text" id="regUser" required minlength="3"></div>
        <div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div>
        <div class="form-group"><label>Contrasena</label><div class="pw-wrap"><input type="password" id="regPass" required minlength="6"><button type="button" class="pw-toggle" onclick="togglePass('regPass',this)">&#128065;</button></div></div>
        <div class="form-group"><label>Confirmar</label><div class="pw-wrap"><input type="password" id="regPassConfirm" required><button type="button" class="pw-toggle" onclick="togglePass('regPassConfirm',this)">&#128065;</button></div></div>
        <button type="submit" class="btn-primary">Crear</button>
        <button type="button" class="btn-secondary" onclick="showLogin()">Cancelar</button>
      </form>
      <div class="toggle-form">¿Ya tienes cuenta? <a onclick="showLogin()">Iniciar sesion</a></div>
    </div>
    <div class="footer"><p>C 2026 Synergy Light. Todos los derechos reservados.</p></div>
  </div>
  <script>
    function togglePass(id,btn){
      var inp=document.getElementById(id);
      if(inp.type==='password'){inp.type='text';btn.textContent='&#128064;'}
      else{inp.type='password';btn.textContent='&#128065;'}
    }
    function hashPassword(p){var h=0;for(var i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h=h&h}return'sl_'+Math.abs(h).toString(36)+'_'+p.length}
    function generateToken(){return'token_'+Date.now()+'_'+Math.random().toString(36).substr(2,9)}
    function showRegister(){document.getElementById('loginSection').classList.add('hidden');document.getElementById('registerSection').classList.remove('hidden');clearMessages()}
    function showLogin(){document.getElementById('registerSection').classList.add('hidden');document.getElementById('loginSection').classList.remove('hidden');clearMessages()}
    function clearMessages(){document.querySelectorAll('.message').forEach(function(el){el.style.display='none';el.textContent=''})}
    function showMessage(id,text,type){var el=document.getElementById(id);el.textContent=text;el.className='message '+type;el.style.display='block'}
    document.getElementById('registerForm').addEventListener('submit',function(e){
      e.preventDefault();clearMessages()
      var n=document.getElementById('regName').value.trim()
      var u=document.getElementById('regUser').value.trim().toLowerCase()
      var em=document.getElementById('regEmail').value.trim()
      var p=document.getElementById('regPass').value
      var pc=document.getElementById('regPassConfirm').value
      if(p!==pc){showMessage('registerError','Las contrasenas no coinciden','error');return}
      if(p.length<6){showMessage('registerError','Minimo 6 caracteres','error');return}
      if(!/[A-Z]/.test(p)){showMessage('registerError','Falta mayuscula','error');return}
      if(!/[0-9]/.test(p)){showMessage('registerError','Falta numero','error');return}
      var users=JSON.parse(localStorage.getItem('synergy_users')||'[]')
      if(users.find(function(x){return x.username===u})){showMessage('registerError','Usuario ya existe','error');return}
      users.push({id:Date.now(),name:n,username:u,email:em,passwordHash:hashPassword(p),createdAt:new Date().toISOString(),role:'admin'})
      localStorage.setItem('synergy_users',JSON.stringify(users))
      showMessage('registerSuccess','Usuario creado exitosamente','success')
      document.getElementById('registerForm').reset()
      setTimeout(function(){showLogin();document.getElementById('loginUser').value=u},2000)
    })
    document.getElementById('loginForm').addEventListener('submit',function(e){
      e.preventDefault();clearMessages()
      var u=document.getElementById('loginUser').value.trim().toLowerCase()
      var p=document.getElementById('loginPass').value
      var users=JSON.parse(localStorage.getItem('synergy_users')||'[]')
      var found=users.find(function(x){return x.username===u})
      if(!found){showMessage('loginError','Usuario no encontrado','error');return}
      if(found.passwordHash!==hashPassword(p)){showMessage('loginError','Contrasena incorrecta','error');return}
      var ses={token:generateToken(),userId:found.id,username:found.username,name:found.name,email:found.email,role:found.role,loginTime:new Date().toISOString(),expiresAt:new Date(Date.now()+8*60*60*1000).toISOString()}
      localStorage.setItem('synergy_session',JSON.stringify(ses))
      window.location.href='dashboard.html'
    })
    window.addEventListener('load',function(){
      var ses=JSON.parse(localStorage.getItem('synergy_session')||'null')
      if(ses&&new Date(ses.expiresAt)>new Date()){window.location.href='dashboard.html'}
    })
    if(!JSON.parse(localStorage.getItem('synergy_users')||'[]').length){
      localStorage.setItem('synergy_users',JSON.stringify([{id:1,name:'Administrador',username:'admin',email:'synergylightservices@gmail.com',passwordHash:hashPassword('Synergy2026'),createdAt:new Date().toISOString(),role:'superadmin'}]))
    }
  </script>
</body>
</html>
