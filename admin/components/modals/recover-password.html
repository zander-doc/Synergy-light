<div id="recoverModal" class="modal" style="display: none;">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Recuperar Contraseña</h3>
      <button class="close-modal" id="closeModal">&times;</button>
    </div>
    <div class="modal-body">
      <p>Ingresa tu email y te enviaremos instrucciones para restablecer tu contraseña.</p>
      <form id="recoverForm">
        <div class="form-group">
          <label for="recoverEmail">Email</label>
          <input type="email" id="recoverEmail" placeholder="admin@synergylight.com" required>
        </div>
        <button type="submit" class="btn-primary">Enviar Instrucciones</button>
      </form>
      <div id="recoverMessage" class="success-message" style="display: none;"></div>
    </div>
  </div>
</div>
