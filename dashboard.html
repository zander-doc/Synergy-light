<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Synergy Light</title>
  <link rel="icon" type="image/webp" href="fivicon.webp">
  <script src="assets/js/database.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #FFFFFF;
      min-height: 100vh;
      padding: 20px;
    }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid rgba(3, 188, 137, 0.3);
      border-radius: 15px;
      margin-bottom: 30px;
    }
    .dashboard-header h1 {
      color: #03bc89;
      font-size: 1.8rem;
    }
    .dashboard-header .admin-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .dashboard-header .admin-email {
      color: #B0B0B0;
      font-size: 0.9rem;
    }
    .logout-btn {
      padding: 10px 20px;
      background: rgba(255, 68, 68, 0.2);
      border: 2px solid rgba(255, 68, 68, 0.3);
      color: #ff4444;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .logout-btn:hover {
      background: rgba(255, 68, 68, 0.3);
      transform: translateY(-2px);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid rgba(3, 188, 137, 0.3);
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(3, 188, 137, 0.2);
    }
    .stat-card h3 {
      color: #03bc89;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    .stat-card p { color: #B0B0B0; }
    .stat-card.warning h3 { color: #FFA500; }
    .stat-card.danger h3 { color: #ff4444; }
    .section-card {
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid rgba(3, 188, 137, 0.3);
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 30px;
    }
    .section-card h2 {
      margin-bottom: 20px;
      color: #03bc89;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(3, 188, 137, 0.1);
    }
    th { color: #03bc89; font-weight: 600; }
    td { color: #E0E0E0; }
    .status-active { color: #03bc89; }
    .status-warning { color: #FFA500; }
    .status-danger { color: #ff4444; }
    .success { color: #03bc89; }
    .warning { color: #FFA500; }
    .danger { color: #ff4444; }
    .secondary { color: #B0B0B0; }
    @media (max-width: 600px) {
      .dashboard-header { flex-direction: column; gap: 15px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="dashboard-header">
    <h1>⚡ Synergy Light - Dashboard</h1>
    <div class="admin-info">
      <span class="admin-email" id="adminEmail">admin@synergylight.com</span>
      <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <h3 id="totalClients">0</h3>
      <p>Clientes Activos</p>
    </div>
    <div class="stat-card">
      <h3 id="totalInvoices">0</h3>
      <p>Facturas Emitidas</p>
    </div>
    <div class="stat-card">
      <h3 id="totalRevenue">$0</h3>
      <p>Ingresos Totales</p>
    </div>
    <div class="stat-card warning">
      <h3 id="expiringClients">0</h3>
      <p>Por Vencer</p>
    </div>
  </div>

  <div class="section-card">
    <h2>📋 Últimos Clientes</h2>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>ID Cliente</th>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Contrato</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="recentClientsBody">
          <!-- Se llena con JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <div class="section-card">
    <h2>📄 Facturas Recientes</h2>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Factura #</th>
            <th>Cliente</th>
            <th>Monto</th>
            <th>Fecha</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="recentInvoicesBody">
          <!-- Se llena con JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Verificar autenticación
    if (localStorage.getItem('adminLoggedIn') !== 'true') {
      window.location.href = 'admin.html';
    } else {
      // Mostrar email del admin
      const adminEmail = localStorage.getItem('adminEmail');
      if (adminEmail) {
        document.getElementById('adminEmail').textContent = adminEmail;
      }
      // Cargar dashboard
      loadDashboard();
    }

    function loadDashboard() {
      console.log('Cargando dashboard...');
      
      // Cargar clientes
      const clients = DB.getClients();
      const activeClients = clients.filter(c => c.status === 'ACTIVO').length;
      const expiringClients = clients.filter(c => c.status === 'POR VENCER' || c.status === 'POR DESCONECTAR').length;
      
      console.log(`Clientes totales: ${clients.length}`);
      console.log(`Clientes activos: ${activeClients}`);
      
      document.getElementById('totalClients').textContent = activeClients;
      document.getElementById('expiringClients').textContent = expiringClients;

      // Cargar facturas
      const invoices = DB.getInvoices();
      const totalRevenue = invoices.reduce((sum, inv) => sum + (parseFloat(inv.total) || 0), 0);
      const pendingInvoices = invoices.filter(inv => inv.status === 'PENDIENTE').length;
      
      console.log(`Facturas totales: ${invoices.length}`);
      console.log(`Ingresos totales: $${totalRevenue}`);
      
      document.getElementById('totalInvoices').textContent = invoices.length;
      document.getElementById('totalRevenue').textContent = `$${totalRevenue.toFixed(2)}`;
      document.getElementById('pendingInvoices').textContent = pendingInvoices;

      // Cargar últimos clientes en tabla
      const recentClients = clients.slice(-5).reverse();
      const clientsTableBody = document.getElementById('recentClientsBody');
      if (clientsTableBody) {
        clientsTableBody.innerHTML = '';
        
        if (recentClients.length === 0) {
          clientsTableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px;">No hay clientes registrados</td></tr>';
        } else {
          recentClients.forEach(client => {
            const row = document.createElement('tr');
            let statusClass = '';
            let statusText = client.status || 'N/A';
            
            switch(client.status) {
              case 'ACTIVO': statusClass = 'success'; break;
              case 'POR VENCER': statusClass = 'warning'; break;
              case 'POR DESCONECTAR': statusClass = 'danger'; break;
              case 'SIN CONEXIÓN': statusClass = 'secondary'; break;
              default: statusClass = '';
            }
            
            row.innerHTML = `
              <td>${client.clientId || 'N/A'}</td>
              <td>${client.name || 'N/A'}</td>
              <td>${client.phone || 'N/A'}</td>
              <td>${client.contractType || 'N/A'}</td>
              <td class="status ${statusClass}">${statusText}</td>
              <td>
                <button onclick="editClient('${client.id}')" class="btn-sm">✏️</button>
                <button onclick="sendWhatsApp('${client.phone || ''}', '${client.name || ''}')" class="btn-sm">💬</button>
              </td>
            `;
            clientsTableBody.appendChild(row);
          });
        }
      }

      // Cargar facturas recientes
      const recentInvoices = invoices.slice(-5).reverse();
      const invoicesTableBody = document.getElementById('recentInvoicesBody');
      if (invoicesTableBody) {
        invoicesTableBody.innerHTML = '';
        
        if (recentInvoices.length === 0) {
          invoicesTableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px;">No hay facturas registradas</td></tr>';
        } else {
          recentInvoices.forEach(invoice => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>${invoice.invoiceNumber || 'N/A'}</td>
              <td>${invoice.clientName || 'N/A'}</td>
              <td>$${(parseFloat(invoice.total) || 0).toFixed(2)}</td>
              <td>${new Date(invoice.issueDate || Date.now()).toLocaleDateString()}</td>
              <td class="status ${invoice.status === 'PAGADA' ? 'success' : invoice.status === 'PENDIENTE' ? 'warning' : 'danger'}">${invoice.status || 'PENDIENTE'}</td>
            `;
            invoicesTableBody.appendChild(row);
          });
        }
      }
    }

    function editClient(id) {
      window.location.href = `clients.html?edit=${id}`;
    }

    function sendWhatsApp(phone, name) {
      if (!phone) {
        alert('No hay número de teléfono registrado');
        return;
      }
      const cleanPhone = phone.replace(/\D/g, '');
      const message = `Hola ${name}, le contactamos de Synergy Light`;
      const url = `https://wa.me/1${cleanPhone}?text=${encodeURIComponent(message)}`;
      window.open(url, '_blank');
    }

    // Cargar dashboard al iniciar
    window.addEventListener('load', () => {
      console.log('Dashboard cargado, ejecutando loadDashboard...');
      loadDashboard();
    });

    // Logout
    function logout() {
      localStorage.removeItem('adminLoggedIn');
      localStorage.removeItem('adminEmail');
      localStorage.removeItem('adminRole');
      window.location.href = 'admin.html';
    }
  </script>
</body>
</html>
