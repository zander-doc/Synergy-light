<div id="invoiceModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);z-index:9999;display:none;overflow-y:auto;">
  <div style="background:linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);margin:5% auto;padding:35px;border:2px solid #03bc89;border-radius:20px;max-width:850px;width:90%;box-shadow:0 20px 60px rgba(3,188,137,0.4);max-height:94vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid rgba(3,188,137,0.3);">
      <h2 style="color:#03bc89;margin:0;font-size:1.8rem"> Nueva Factura</h2>
      <button onclick="cerrarModalFactura()" style="background:none;border:none;color:#aaa;font-size:2.5rem;cursor:pointer;transition:all 0.3s ease;" onmouseover="this.style.color='#ff4444';this.style.transform='scale(1.2)'" onmouseout="this.style.color='#aaa';this.style.transform='scale(1)'">&times;</button>
    </div>
    
    <form id="formFactura">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        
        <div style="grid-column:1/-1">
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Cliente *</label>
          <select id="invoiceClient" required onchange="autoRellenarFactura()" style="width:100%;padding:12px 15px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;font-size:1rem;cursor:pointer;">
            <option value="">Seleccione un cliente...</option>
          </select>
          <small style="color:#03bc89;margin-top:5px;display:block;">💡 Los datos se rellenarán automáticamente</small>
        </div>
        
        <div style="grid-column:1/-1">
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Dirección</label>
          <input type="text" id="invoiceAddress" readonly placeholder="Se autocompletará al seleccionar cliente" style="width:100%;padding:12px 15px;background:rgba(10,58,42,0.8);border:2px solid rgba(3,188,137,0.3);color:#03bc89;border-radius:10px;cursor:not-allowed;">
        </div>
        
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Teléfono</label>
          <input type="text" id="invoicePhone" readonly placeholder="Se autocompletará" style="width:100%;padding:12px 15px;background:rgba(10,58,42,0.8);border:2px solid rgba(3,188,137,0.3);color:#03bc89;border-radius:10px;cursor:not-allowed;">
        </div>
        
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Email</label>
          <input type="email" id="invoiceEmail" readonly placeholder="Se autocompletará" style="width:100%;padding:12px 15px;background:rgba(10,58,42,0.8);border:2px solid rgba(3,188,137,0.3);color:#03bc89;border-radius:10px;cursor:not-allowed;">
        </div>
        
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Tarifa</label>
          <input type="text" id="invoiceTarifa" readonly placeholder="Se autocompletará" style="width:100%;padding:12px 15px;background:rgba(10,58,42,0.8);border:2px solid rgba(3,188,137,0.3);color:#03bc89;border-radius:10px;cursor:not-allowed;">
        </div>
        
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">N° Factura</label>
          <input type="text" id="invoiceNumber" readonly placeholder="Auto-generado" style="width:100%;padding:12px 15px;background:rgba(10,58,42,0.8);border:2px solid #03bc89;color:#03bc89;border-radius:10px;font-weight:bold;font-size:1.1rem;">
        </div>
        
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Fecha de Emisión *</label>
          <input type="date" id="invoiceDate" required style="width:100%;padding:12px 15px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;font-size:1rem;">
        </div>
        
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Fecha de Vencimiento *</label>
          <input type="date" id="invoiceDueDate" required style="width:100%;padding:12px 15px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;font-size:1rem;">
        </div>
        
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Ingreso ($) *</label>
          <input type="number" id="invoiceIncome" step="0.01" value="50" oninput="calcularTotalFactura()" required style="width:100%;padding:12px 15px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;font-size:1rem;">
        </div>
        
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Costos Fijos ($) *</label>
          <input type="number" id="invoiceFixed" step="0.01" value="45" oninput="calcularTotalFactura()" required style="width:100%;padding:12px 15px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;font-size:1rem;">
        </div>
        
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Depósito ($) *</label>
          <input type="number" id="invoiceDeposit" step="0.01" value="50" oninput="calcularTotalFactura()" required style="width:100%;padding:12px 15px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;font-size:1rem;">
        </div>
        
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">TOTAL ($) *</label>
          <input type="number" id="invoiceTotal" readonly style="width:100%;padding:12px 15px;background:rgba(10,58,42,0.8);border:2px solid #03bc89;color:#03bc89;border-radius:10px;font-weight:bold;font-size:1.3rem;">
        </div>
        
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Estado *</label>
          <select id="invoiceStatus" required style="width:100%;padding:12px 15px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;font-size:1rem;cursor:pointer;">
            <option value="PENDIENTE">PENDIENTE</option>
            <option value="PAGADA">PAGADA</option>
          </select>
        </div>
        
        <div>
          <label style="color:#03bc89;display:block;margin-bottom:8px;font-weight:600">Método de Pago *</label>
          <select id="invoicePaymentMethod" required style="width:100%;padding:12px 15px;background:rgba(42,42,42,0.8);border:2px solid rgba(3,188,137,0.3);color:white;border-radius:10px;font-size:1rem;cursor:pointer;">
            <option value="ZELLE">ZELLE</option>
            <option value="CASHAPP">CASHAPP</option>
            <option value="LINK DE PAGO">LINK DE PAGO</option>
          </select>
        </div>
      </div>
      
      <div style="margin-top:30px;display:flex;gap:15px;justify-content:flex-end;padding-top:25px;border-top:2px solid rgba(3,188,137,0.2);">
        <button type="button" onclick="cerrarModalFactura()" style="padding:14px 30px;background:rgba(102,102,102,0.8);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:1rem;transition:all 0.3s ease;" onmouseover="this.style.background='rgba(102,102,102,1)';this.style.transform='translateY(-2px)'" onmouseout="this.style.background='rgba(102,102,102,0.8)';this.style.transform='translateY(0)'">Cancelar</button>
        <button type="submit" style="padding:14px 30px;background:linear-gradient(135deg, #03bc89 0%, #04d99e 100%);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:1rem;transition:all 0.3s ease;box-shadow:0 4px 15px rgba(3,188,137,0.3);" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 25px rgba(3,188,137,0.4)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 15px rgba(3,188,137,0.3)'">💾 Guardar Factura</button>
      </div>
    </form>
  </div>
</div>
