<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso - Synergy Light Admin</title>
  <link rel="icon" type="image/webp" href="../favicon.webp">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-container { background: #1a1a1a; border: 2px solid #03bc89; border-radius: 20px; padding: 40px; max-width: 450px; width: 100%; }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { color: #03bc89; font-size: 32px; }
    .form-title { color: #fff; margin-bottom: 25px; text-align: center; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; color: #03bc89; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #03bc89; border-radius: 8px; color: #fff; }
    .btn-primary { width: 100%; padding: 14px; background: #03bc89; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    .btn-secondary { width: 100%; padding: 12px; background: transparent; color: #03bc89; border: 2px solid #03bc89; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    .message { padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; display: none; }
    .message.error { background: rgba(255,68,68,0.1); color: #ff4444; }
    .message.success { background: rgba(3,188,137,0.1); color: #03bc89; }
    .toggle-form { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(3,188,137,0.3); color: #888; font-size: 14px; }
    .toggle-form a { color: #03bc89; cursor: pointer; }
    .footer { text-align: center; margin-top: 25px; color: #666; font-size: 12px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <a href="../index.html" style="color:#03bc89;text-decoration:none;position:absolute;top:20px;left:20px">â† Volver</a>
  <div class="login-container">
    <div class="logo"><h1>SYNERGY LIGHT</h1><p>Panel Administrativo</p></div>
    <div id="loginSection">
      <h2 class="form-title">Iniciar SesiÃ³n</h2>
      <div class="message error" id="loginError"></div>
      <form id="loginForm">
        <div class="form-group"><label>Usuario</label><input type="text" id="loginUser" required autocomplete="username"></div>
        <div class="form-group"><label>ContraseÃ±a</label><input type="password" id="loginPass" required autocomplete="current-password"></div>
        <button type="submit" class="btn-primary">Ingresar</button>
      </form>
      <div class="toggle-form">Â¿No tienes cuenta? <a onclick="showRegister()">Crear usuario</a></div>
    </div>
    <div id="registerSection" class="hidden">
      <h2 class="form-title">Crear Usuario</h2>
      <div class="message error" id="registerError"></div>
      <div class="message success" id="registerSuccess"></div>
      <form id="registerForm">
        <div class="form-group"><label>Nombre</label><input type="text" id="regName" required></div>
        <div class="form-group"><label>Usuario</label><input type="text" id="regUser" required minlength="3"></div>
        <div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div>
        <div class="form-group"><label>ContraseÃ±a</label><input type="password" id="regPass" required minlength="6"></div>
        <div class="form-group"><label>Confirmar</label><input type="password" id="regPassConfirm" required></div>
        <button type="submit" class="btn-primary">Crear</button>
        <button type="button" class="btn-secondary" onclick="showLogin()">Cancelar</button>
      </form>
      <div class="toggle-form">Â¿Ya tienes cuenta? <a onclick="showLogin()">Iniciar sesiÃ³n</a></div>
    </div>
    <div class="footer"><p>Â© 2026 Synergy Light. Todos los derechos reservados.</p></div>
  </div>
  <script>
    function hashPassword(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h=h&h;}return"sl_"+Math.abs(h).toString(36)+"_"+p.length;}
    function generateToken(){return"token_"+Date.now()+"_"+Math.random().toString(36).substr(2,9);}
    function showRegister(){document.getElementById("loginSection").classList.add("hidden");document.getElementById("registerSection").classList.remove("hidden");clearMessages();}
    function showLogin(){document.getElementById("registerSection").classList.add("hidden");document.getElementById("loginSection").classList.remove("hidden");clearMessages();}
    function clearMessages(){document.querySelectorAll(".message").forEach(function(el){el.style.display="none";el.textContent="";});}
    function showMessage(id,text,type){var el=document.getElementById(id);el.textContent=text;el.className="message "+type;el.style.display="block";}
    document.getElementById("registerForm").addEventListener("submit",function(e){
      e.preventDefault();clearMessages();
      var name=document.getElementById("regName").value.trim();
      var user=document.getElementById("regUser").value.trim().toLowerCase();
      var email=document.getElementById("regEmail").value.trim();
      var pass=document.getElementById("regPass").value;
      var passConfirm=document.getElementById("regPassConfirm").value;
      if(pass!==passConfirm){showMessage("registerError","Las contrasenas no coinciden","error");return;}
      if(pass.length<6){showMessage("registerError","Minimo 6 caracteres","error");return;}
      if(!/[A-Z]/.test(pass)){showMessage("registerError","Falta mayuscula","error");return;}
      if(!/[0-9]/.test(pass)){showMessage("registerError","Falta numero","error");return;}
      var users=JSON.parse(localStorage.getItem("synergy_users")||"[]");
      if(users.find(function(u){return u.username===user;})){showMessage("registerError","Usuario existe","error");return;}
      users.push({id:Date.now(),name:name,username:user,email:email,passwordHash:hashPassword(pass),createdAt:new Date().toISOString(),role:"admin"});
      localStorage.setItem("synergy_users",JSON.stringify(users));
      showMessage("registerSuccess","Usuario creado","success");
      document.getElementById("registerForm").reset();
      setTimeout(function(){showLogin();document.getElementById("loginUser").value=user;},2000);
    });
    document.getElementById("loginForm").addEventListener("submit",function(e){
      e.preventDefault();clearMessages();
      var user=document.getElementById("loginUser").value.trim().toLowerCase();
      var pass=document.getElementById("loginPass").value;
      var users=JSON.parse(localStorage.getItem("synergy_users")||"[]");
      var foundUser=users.find(function(u){return u.username===user;});
      if(!foundUser){showMessage("loginError","Usuario no encontrado","error");return;}
      if(foundUser.passwordHash!==hashPassword(pass)){showMessage("loginError","Contrasena incorrecta","error");return;}
      var session={token:generateToken(),userId:foundUser.id,username:foundUser.username,name:foundUser.name,email:foundUser.email,role:foundUser.role,loginTime:new Date().toISOString(),expiresAt:new Date(Date.now()+8*60*60*1000).toISOString()};
      localStorage.setItem("synergy_session",JSON.stringify(session));
      localStorage.setItem("isLoggedIn","true");
      window.location.href="dashboard.html";
    });
    window.addEventListener("load",function(){
      var session=JSON.parse(localStorage.getItem("synergy_session")||"null");
      if(session){
        if(new Date(session.expiresAt)<new Date()){
          localStorage.removeItem("synergy_session");localStorage.removeItem("isLoggedIn");return;
        }
        window.location.href="dashboard.html";
      }
    });
    (function initDefaultAdmin(){
      var users=JSON.parse(localStorage.getItem("synergy_users")||"[]");
      if(users.length===0){
        localStorage.setItem("synergy_users",JSON.stringify([{id:1,name:"Administrador",username:"admin",email:"synergylightservices@gmail.com",passwordHash:hashPassword("Synergy2026"),createdAt:new Date().toISOString(),role:"superadmin"}]));
        console.log("Usuario admin por defecto creado");
      }
    })();
  </script>
</body>
</html>
